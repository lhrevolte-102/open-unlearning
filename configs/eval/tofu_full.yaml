# @package eval.tofu
# NOTE: the above line is not a comment, but sets the package for config. See https://hydra.cc/docs/upgrades/0.11_to_1.0/adding_a_package_directive/

defaults:
  - tofu_metrics:
    - forget_Truth_Ratio
    - forget_quality
    - forget_Q_A_Prob
    - forget_Q_A_ROUGE
    - model_utility
    - privleak
    - extraction_strength
    - exact_memorization
    - mia_min_k_plus_plus
    - mia_min_k
    - mia_loss
    - mia_zlib
    - mia_gradnorm
    - mia_reference

handler: TOFUEvaluator
output_dir: ${paths.output_dir}
metrics:
  mia_reference:
    reference_model_path: ${eval.tofu.reference_model_path}
overwrite: false
forget_split: forget10
holdout_split: holdout10
retain_logs_path: null
reference_model_path: null
question_key: "question"
batch_size: 32
