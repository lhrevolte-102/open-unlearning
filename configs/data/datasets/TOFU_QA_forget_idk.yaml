TOFU_QA_forget_idk:
  handler: QAwithIdkDataset
  args:
    hf_args:
      name: "forget10"
      split: "train"
      path: "locuslab/TOFU"
    question_key: "question"
    answer_key: "answer"
    max_length: 512
    idk_path: ./data/idk.jsonl
    return_original: true
    allowed_indices_path: null
    idk_sampling_mode: random
    idk_sampling_seed: 0
    
