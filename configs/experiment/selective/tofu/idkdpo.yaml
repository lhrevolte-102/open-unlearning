# @package _global_

defaults:
  - override /model: Llama-3.2-1B-Instruct
  - override /collator: DataCollatorForSupervisedDatasetwithIndex

model:
  model_args:
    pretrained_model_name_or_path: open-unlearning/tofu_Llama-3.2-1B-Instruct_full

forget_split: forget10
method: IdkDPO
beta: 0.1
num_folds: 4

data:
  TOFU_QA_forget_idk:
    handler: QAwithIdkDataset
    args:
      hf_args:
        path: locuslab/TOFU
        name: ${forget_split}
        split: train
      question_key: question
      answer_key: answer
      max_length: 512
      idk_path: ./data/idk.jsonl
      return_original: true
      allowed_indices_path: null
      idk_sampling_mode: deterministic
      idk_sampling_seed: 0
