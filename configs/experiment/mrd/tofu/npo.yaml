# @package _global_

defaults:
  - override /model: Llama-3.2-1B-Instruct
  - override /collator: DataCollatorForSupervisedDatasetwithIndex

model:
  model_args:
    pretrained_model_name_or_path: open-unlearning/tofu_Llama-3.2-1B-Instruct_full

forget_split: forget10
retain_split: retain90

data:
  TOFU_QA_forget:
    handler: QADataset
    args:
      hf_args:
        path: locuslab/TOFU
        name: ${forget_split}
        split: train
      question_key: question
      answer_key: answer
      max_length: 512
      allowed_indices_path: null
