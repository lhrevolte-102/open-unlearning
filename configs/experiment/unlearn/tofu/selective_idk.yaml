# @package _global_

defaults:
  - /experiment/unlearn/tofu/idk
  - override /trainer: DPO

selective_manifest_path: null
intra_stage_order: random
stage_percentiles: [0.3, 0.6, 1.0]
stage_epoch_ratios: [0.2, 0.4, 0.4]

trainer:
  train_sampler: random

data:
  forget:
    TOFU_QA_forget_idk:
      args:
        allowed_indices_path: ${selective_manifest_path}
        preserve_manifest_order: false
        idk_sampling_mode: random
        idk_sampling_seed: 0
