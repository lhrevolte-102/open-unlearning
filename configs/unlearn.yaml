defaults:
  - model: Llama-3.2-3B-Instruct
  - trainer: GradAscent
  - data: unlearn
  - collator: DataCollatorForSupervisedDataset
  - eval: tofu
  - hydra: default
  - paths: default
  - experiment: null
  - _self_

trainer:
  args: 
    remove_unused_columns: False

mode: unlearn
task_name: ???
resume_from_checkpoint: null
trackio:
  enabled: false
  project: open-unlearning
  name: ${task_name}
  group: null
  local_dir: saves/trackio
  space_id: null
  dataset_id: null
  auto_log_gpu: null
  gpu_log_interval: 10.0
  webhook_url: null
  webhook_min_level: null
